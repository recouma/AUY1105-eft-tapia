# ============================================================
# Pipeline CI/CD — Análisis de calidad y seguridad
# ============================================================
# Se activa en Pull Requests hacia main.
# Etapas secuenciales:
#   1. TFLint  — Análisis estático
#   2. Checkov — Análisis de seguridad
#   3. Terraform Validate — Validación sintáctica
#   4. OPA     — Evaluación de políticas
# ============================================================

name: "Terraform CI/CD"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # -------------------------------------------------------
  # Etapa 1: Análisis estático con TFLint
  # -------------------------------------------------------
  tflint:
    name: "1. Análisis Estático (TFLint)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Inicializar TFLint
        run: tflint --init

      - name: Ejecutar TFLint
        run: tflint --recursive --format compact

  # -------------------------------------------------------
  # Etapa 2: Análisis de seguridad con Checkov
  # -------------------------------------------------------
  checkov:
    name: "2. Análisis de Seguridad (Checkov)"
    runs-on: ubuntu-latest
    needs: tflint
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Ejecutar Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: "CKV2_AWS_19,CKV_AWS_144"

  # -------------------------------------------------------
  # Etapa 3: Validación Terraform
  # -------------------------------------------------------
  validate:
    name: "3. Validación Terraform"
    runs-on: ubuntu-latest
    needs: checkov
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  # -------------------------------------------------------
  # Etapa 4: Evaluación de políticas con OPA
  # -------------------------------------------------------
  opa:
    name: "4. Políticas de Seguridad (OPA)"
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod 755 opa
          sudo mv opa /usr/local/bin/

      - name: "Test A: Plan conforme (debe pasar)"
        run: |
          echo "=== Evaluando plan CONFORME ==="
          RESULT=$(opa eval -d policies/ -i tests/plan-conforme.json "data.terraform.security.deny" --format raw)
          echo "Resultado: $RESULT"
          if [ "$RESULT" = "[]" ]; then
            echo "✅ PASS: Plan conforme no genera denegaciones"
          else
            echo "❌ FAIL: Plan conforme generó denegaciones inesperadas"
            exit 1
          fi

      - name: "Test B: SSH público (debe denegar)"
        run: |
          echo "=== Evaluando plan con SSH PÚBLICO ==="
          RESULT=$(opa eval -d policies/ -i tests/plan-ssh-publico.json "data.terraform.security.deny" --format raw)
          echo "Resultado: $RESULT"
          if [ "$RESULT" != "[]" ]; then
            echo "✅ PASS: SSH público fue correctamente denegado"
          else
            echo "❌ FAIL: SSH público NO fue denegado"
            exit 1
          fi

      - name: "Test C: Tipo de instancia inválido (debe denegar)"
        run: |
          echo "=== Evaluando plan con TIPO INVÁLIDO ==="
          RESULT=$(opa eval -d policies/ -i tests/plan-tipo-invalido.json "data.terraform.security.deny" --format raw)
          echo "Resultado: $RESULT"
          if [ "$RESULT" != "[]" ]; then
            echo "✅ PASS: Tipo inválido fue correctamente denegado"
          else
            echo "❌ FAIL: Tipo inválido NO fue denegado"
            exit 1
          fi

      - name: "Test D: Volumen sin cifrado (debe denegar)"
        run: |
          echo "=== Evaluando plan SIN CIFRADO ==="
          RESULT=$(opa eval -d policies/ -i tests/plan-sin-cifrado.json "data.terraform.security.deny" --format raw)
          echo "Resultado: $RESULT"
          if [ "$RESULT" != "[]" ]; then
            echo "✅ PASS: Volumen sin cifrado fue correctamente denegado"
          else
            echo "❌ FAIL: Volumen sin cifrado NO fue denegado"
            exit 1
          fi

      - name: "Test E: Recursos sin tags obligatorios (debe denegar)"
        run: |
          echo "=== Evaluando plan SIN TAGS ==="
          RESULT=$(opa eval -d policies/ -i tests/plan-sin-tags.json "data.terraform.security.deny" --format raw)
          echo "Resultado: $RESULT"
          if [ "$RESULT" != "[]" ]; then
            echo "✅ PASS: Falta de tags fue correctamente denegada"
          else
            echo "❌ FAIL: Falta de tags NO fue denegada"
            exit 1
          fi

  # -------------------------------------------------------
  # Etapa 5: Terraform Plan (reporte de cambios)
  # -------------------------------------------------------
  plan:
    name: "5. Terraform Plan"
    runs-on: ubuntu-latest
    needs: opa
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Plan
        run: terraform plan -input=false
